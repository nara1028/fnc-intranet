<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
    <title>문서함</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <style>
        :root {
            --blue: #256EF4;
            --blue-dark: #1555D4;
            --blue-light: #E8F0FE;
            --gray-bg: #F5F6F8;
            --text: #1A1D23;
            --text-sub: #6B7280;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--gray-bg);
            color: var(--text);
        }

        .main-header {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1A1D23;
        }

        .site-logo img {
            height: 32px;
            width: auto;
        }

        .logo-divider {
            width: 1px;
            height: 18px;
            background: var(--border);
        }

        .logo-title {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: var(--text-sub);
        }

        .main-nav {
            display: flex;
            align-items: center;
            gap: 4px;
            list-style: none;
            padding: 0;
        }

        .nav-underline .nav-link.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
            font-size: 14px;
        }

        .nav-underline .nav-link {
            color: var(--text-sub);
            font-size: 14px;
        }

        .nav-underline .nav-link:hover {
            color: var(--blue);
            border-color: var(--blue-light);
        }

        .nav-item-link {
            display: block;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-sub);
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.2s, color 0.2s;
        }

        .nav-item-link:hover {
            background: var(--blue-light);
            color: var(--blue);
        }

        .nav-item-link.active {
            background: var(--blue);
            color: #fff;
        }

        .page-top {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 28px 0 24px;
        }

        .page-top-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .btn-upload {
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
        }

        .btn-upload:hover {
            background: var(--blue-dark);
            transform: translateY(-1px);
        }

        .board-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 24px 16px;
        }

        .page-link {
            color: var(--text-sub);
            border-color: var(--border);
            border-radius: 8px !important;
        }

        .page-link:hover {
            background-color: var(--blue-light);
            color: var(--blue);
            border-color: var(--blue);
        }

        .page-link.active .page-link {
            background-color: var(--blue);
            border-color: var(--border);
        }

        .pagination {
            gap: 4px;
        }

        .form-wrap {
            background: #fff;
            border-radius: 12px;
            margin: 28px auto 0;
            padding: 40px 48px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            max-width: 720px;
        }

        .form-label {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            margin-bottom: 6px;
        }
    </style>
</head>

<body>
    <header class="main-header sticky-top">
        <a href="/" class="site-logo text-decoration-none">
            <img src="logo.png" alt="FNC Logo">
            <div class="logo-divider"></div>
            <span class="logo-title">FNC INTRANET SYSTEM</span>
        </a>
        <ul class="main-nav mb-0">
            <li><a href="gallery.html" class="nav-item-link">갤러리</a></li>
            <li><a href="board.html" class="nav-item-link">자유게시판</a></li>
            <li><a href="form.html" class="nav-item-link active">문서등록</a></li>
            <li><a href="#" class="nav-item-link">공지사항</a></li>
            <li><a href="#" class="nav-item-link">예약하기</a></li>
        </ul>
    </header>
    <div class="page-top">
        <div class="page-top-inner">
            <div>
                <h1 class="page-title mb-1">내 문서함</h1>
                <p class="text-secondary mb-0" style="font-size: 13px;">문서등록</p>
            </div>
        </div>
    </div>
    <main>
        <div class="container">
            <div class="form-wrap">
                <ul class="nav nav-underline mb-4">
                    <li class="nav-item">
                        <a class="nav-link active" data-bs-toggle="tab" href="#휴가">휴가신청서</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="tab" href="#출장">출장품의서</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="tab" href="#지출">지출품의서</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="tab" href="#재택">재택신청서</a>
                    </li>
                </ul>
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="휴가">
                        <div class="mb-3">
                            <label class="form-label">성명</label>
                            <select class="form-select">
                                <option selected>신나라</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">휴가 일자</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">시작일</label>
                            <div class="d-flex gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="startDay" id="vacation-전일"
                                        checked>
                                    <label class="form-check-label" for="vacation-전일">전일</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="startDay" id="오전반차">
                                    <label class="form-check-label" for="오전반차">오전반차</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="startDay" id="오후반차">
                                    <label class="form-check-label" for="오후반차">오후반차</label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">휴가 사유</label>
                                <textarea class="form-control" row="3" placeholder="휴가 사유를 입력하세요"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="출장">
                        <div class="mb-3">
                            <label class="form-label">참여자</label>
                            <div class="form-control d-flex align-items-center gap-2">
                                <span class="participant-tag">
                                    <button type="button" class="btn-close"></button>
                                </span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">출장일자</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">시작일</label>
                            <div class="d-flex gap-3 mt-1">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="trip-day" id="trip-전일" checked>
                                    <label class="form-check-label" for="trip-전일">전일</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="trip-day" id="trip-오전">
                                    <label class="form-check-label" for="trip-오전">오전</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="trip-day" id="trip-오후">
                                    <label class="form-check-label" for="trip-오후">오후</label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">관련 과제</label>
                            <select class="form-select">
                                <option selected>none</option>
                            </select>
                        </div>
                        <div class="row mb-3">
                            <div class="col-8">
                                <label class="form-label">출장지(기관/지역)</label>
                                <select class="form-select">
                                    <option selected>------</option>
                                </select>
                            </div>
                            <div class="col-4">
                                <label class="form-label">지역</label>
                                <input type="text" class="form-control">
                            </div>
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label class="form-label">출장 목적</label>
                                    <input type="text" class="form-control">
                                </div>
                            </div>
                            <div class="col-6">
                                <label class="form-label">출장 관계자</label>
                                <input type="text" class="form-control">
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="지출">
                        <div class="mb-3">
                            <label class="form-label">참여자(외부)</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">관련 과제</label>
                            <select class="form-select">
                                <option selected>none</option>
                            </select>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label">집행 종류</label>
                                <div class="form-check">
                                    <input class="form-check-input">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="재택">
                        <div class="mb-3">
                            <label class="form-label">성명</label>
                            <select class="form-select">
                                <option selected>신나라</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">재택근무 일자</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">시작일</label>
                            <div class="d-flex gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="remoteDay" id="remote-전일"
                                        checked>
                                    <label class="form-check-label" for="remote-">전일</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="remoteDay" id="오전">
                                    <label class="form-check-label" for="오전">오전</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="remoteDay" id="오후">
                                    <label class="form-check-label" for="오후">오후</label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">재택 사유</label>
                                <textarea class="form-control" row="3" placeholder="재택 사유를 입력하세요"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div class="d-flex justify-content-center gap-2 mt-4">
                <button type="button" class="btn btn-primary px-4">저장</button>
                <button type="button" class="btn btn-outline-secondary px-4">취소</button>
            </div>
        </div>
        </div>
        </div>
    </main>
    <footer class="py-3 my-4 border-top text-center">
        <p class="text-body-secondary mb-0" style="font-size: 12px;">
            Copyright &copy; FNC Technology Co.,Ltd ALL RIGHTS RESERVED
        </p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
